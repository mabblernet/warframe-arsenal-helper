<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Warframe Arsenal Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0c0e;--surface:#111418;--card:#151a1f;--card-h:#1c2330;--elevated:#1e252f;
  --border:#1f2a35;--border-b:#2a3a4a;
  --gold:#c8a84b;--gold-dim:#7a6330;--gold-glow:rgba(200,168,75,.18);
  --red:#e05a2b;--blue:#4a9eca;--grey:#4a5560;
  --t1:#d8dde3;--t2:#7a8898;--t3:#4a5560;
  --r:6px;--cr:8px;--tr:.18s ease;
  --fd:'Rajdhani',sans-serif;--fb:'Inter',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}
body{font-family:var(--fb);background:var(--bg);color:var(--t1);min-height:100vh;line-height:1.5;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(ellipse 80% 50% at 50% -10%,rgba(200,168,75,.06) 0%,transparent 70%),
  repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(255,255,255,.015) 40px),
  repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(255,255,255,.015) 40px);
  pointer-events:none;z-index:0}

.wrap{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:0 16px}

/* HEADER */
.hdr{padding:18px 0 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.hdr-l{display:flex;align-items:center;gap:12px}
.logo{display:flex;align-items:center;gap:10px}
.logo-ico{width:34px;height:34px;background:var(--gold);clip-path:polygon(50% 0%,100% 38%,82% 100%,18% 100%,0% 38%);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.logo h1{font-family:var(--fd);font-size:1.4rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.logo h1 span{color:var(--gold)}
.hdr-r{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.user-pill{display:flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:4px 12px 4px 8px;font-size:.78rem}
.user-pill .ui{color:var(--gold)}
#uname{color:var(--t2);font-size:.78rem}

/* FILTER SECTIONS */
.fs{padding:10px 0 0}
.fs-lbl{font-family:var(--fd);font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);margin-bottom:5px}
.fg{display:flex;flex-wrap:wrap;gap:5px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.fb{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:4px 11px;color:var(--t2);font-size:.76rem;font-family:var(--fd);letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all var(--tr);white-space:nowrap}
.fb:hover{border-color:var(--gold-dim);color:var(--t1)}
.fb.on{background:var(--elevated);border-color:var(--gold);color:var(--gold)}
.tb.te.on{border-color:var(--red);color:var(--red);background:rgba(224,90,43,.1)}
.tb.tg.on{border-color:var(--blue);color:var(--blue);background:rgba(74,158,202,.1)}
.tb.tf.on{border-color:var(--grey);color:var(--t2);background:rgba(74,85,96,.15)}

/* CONTROLS */
.ctrl{padding:12px 0;display:flex;align-items:center;gap:8px;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.sw{position:relative;flex:1;min-width:180px;max-width:280px}
.si{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:.85rem;pointer-events:none}
#srch{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:7px 9px 7px 30px;color:var(--t1);font-size:.83rem;font-family:var(--fb);transition:border-color var(--tr)}
#srch:focus{outline:none;border-color:var(--gold-dim)}
#srch::placeholder{color:var(--t3)}
.qb{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:5px 13px;color:var(--t2);font-size:.78rem;font-family:var(--fb);cursor:pointer;transition:all var(--tr);white-space:nowrap}
.qb:hover{border-color:var(--gold-dim);color:var(--t1)}
.qb.on{background:var(--gold-glow);border-color:var(--gold);color:var(--gold)}
#rcount{margin-left:auto;font-size:.78rem;color:var(--t3);font-family:var(--fd);letter-spacing:.04em}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:13px;padding:14px 0 40px}

/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--cr);overflow:hidden;display:flex;flex-direction:column;transition:border-color var(--tr),box-shadow var(--tr),transform var(--tr);position:relative}
.card:hover{border-color:var(--border-b);box-shadow:0 4px 20px rgba(0,0,0,.4);transform:translateY(-1px)}
.card.mastered{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold),0 2px 10px rgba(200,168,75,.15)}
.card.owned:not(.mastered){border-color:var(--blue)}
.stripe{height:3px;flex-shrink:0}
.stripe.te{background:linear-gradient(90deg,var(--red),rgba(224,90,43,.3))}
.stripe.tg{background:linear-gradient(90deg,var(--blue),rgba(74,158,202,.3))}
.stripe.tf{background:var(--grey)}
.ch{display:flex;align-items:flex-start;gap:11px;padding:11px 13px 9px}
.img-w{width:68px;height:68px;flex-shrink:0;background:var(--surface);border-radius:5px;border:1px solid var(--border);overflow:hidden;display:flex;align-items:center;justify-content:center}
.wimg{width:100%;height:100%;object-fit:contain;padding:4px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.6))}
.ctb{flex:1;min-width:0}
.wname{font-family:var(--fd);font-size:1.05rem;font-weight:600;letter-spacing:.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.wmeta{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px}
.tt,.st,.mr{font-size:.66rem;font-family:var(--fd);letter-spacing:.06em;text-transform:uppercase;border-radius:3px;padding:1px 5px}
.tt{background:var(--elevated);color:var(--t2);border:1px solid var(--border)}
.st{background:rgba(74,158,202,.1);color:var(--blue);border:1px solid rgba(74,158,202,.2)}
.mr{background:rgba(200,168,75,.1);color:var(--gold);border:1px solid rgba(200,168,75,.2)}
.tlbl{font-family:var(--fd);font-size:.7rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-top:5px}
.tlbl.te{color:var(--red)}.tlbl.tg{color:var(--blue)}.tlbl.tf{color:var(--grey)}
.cb{padding:0 13px 9px;flex:1;display:flex;flex-direction:column;gap:7px}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:.7rem;border-radius:4px;padding:2px 7px;width:fit-content}
.bq{background:rgba(180,100,255,.1);color:#b464ff;border:1px solid rgba(180,100,255,.22)}
.ba{background:var(--elevated);color:var(--t2);border:1px solid var(--border)}
.dr{display:flex;align-items:center;gap:7px;margin-top:1px}
.dl{font-size:.7rem;color:var(--t3);font-family:var(--fd);letter-spacing:.06em;text-transform:uppercase;min-width:38px}
.dots{display:flex;gap:3px}
.dot{width:9px;height:9px;border-radius:2px;background:var(--elevated);border:1px solid var(--border-b)}
.dot.f{background:var(--gold);border-color:var(--gold)}
.ad{font-size:.76rem;color:var(--t2);line-height:1.5}
.tn{font-size:.76rem;color:var(--t2);border-left:2px solid var(--border-b);padding-left:7px;line-height:1.5;font-style:italic}
.mastered .tn{border-color:var(--gold)}
.cs{margin-top:3px}
.ct{font-size:.71rem;font-family:var(--fd);letter-spacing:.06em;text-transform:uppercase;color:var(--t3);cursor:pointer;user-select:none;transition:color var(--tr)}
.ct:hover{color:var(--t2)}
.cl{margin-top:5px;display:flex;flex-direction:column;gap:4px}
.cr{display:flex;flex-wrap:wrap;align-items:baseline;gap:5px;font-size:.72rem;background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:4px 7px}
.cn{color:var(--t1);font-weight:500}.cq{color:var(--gold);font-family:var(--fd);font-size:.78rem}
.csrc{color:var(--t3);font-size:.68rem;width:100%;margin-top:1px}
.cf{padding:7px 13px 11px;border-top:1px solid var(--border);display:flex;align-items:center;gap:7px;justify-content:space-between}
.tr-row{display:flex;gap:5px}
.tbtn{display:flex;align-items:center;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:4px 9px;color:var(--t3);font-size:.73rem;font-family:var(--fb);cursor:pointer;transition:all var(--tr)}
.tbtn:hover{border-color:var(--border-b);color:var(--t2)}
.tbtn.on{background:rgba(74,158,202,.12);border-color:var(--blue);color:var(--blue)}
.tbtn.mb.on{background:var(--gold-glow);border-color:var(--gold);color:var(--gold)}
.wl{font-size:.71rem;color:var(--t3);text-decoration:none;font-family:var(--fd);letter-spacing:.06em;text-transform:uppercase;transition:color var(--tr)}
.wl:hover{color:var(--gold)}
.empty{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;gap:14px;padding:70px 20px;color:var(--t3)}
.empty-ico{font-size:2.5rem;opacity:.25}
.empty p{font-size:.88rem}
.empty button{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:7px 18px;color:var(--t2);cursor:pointer;font-family:var(--fb);transition:all var(--tr)}
.empty button:hover{border-color:var(--gold-dim);color:var(--t1)}

/* LOADER */
#ldr{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000}
.linner{display:flex;flex-direction:column;align-items:center;gap:14px}
.llogo{width:44px;height:44px;background:var(--gold);clip-path:polygon(50% 0%,100% 38%,82% 100%,18% 100%,0% 38%);animation:pulse 1.2s ease-in-out infinite alternate}
@keyframes pulse{from{opacity:.4;transform:scale(.9)}to{opacity:1;transform:scale(1.05)}}
.ltxt{font-family:var(--fd);font-size:.8rem;letter-spacing:.2em;text-transform:uppercase;color:var(--t3)}

/* MODAL */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:500;align-items:center;justify-content:center;padding:20px}
.md{background:var(--card);border:1px solid var(--border-b);border-radius:10px;padding:26px 22px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.md h2{font-family:var(--fd);font-size:1.15rem;letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px}
.md p{font-size:.8rem;color:var(--t2);margin-bottom:14px;line-height:1.5}
.md input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:8px 11px;color:var(--t1);font-size:.88rem;font-family:var(--fb);margin-bottom:13px;transition:border-color var(--tr)}
.md input:focus{outline:none;border-color:var(--gold-dim)}
.mbtns{display:flex;gap:7px;justify-content:flex-end}
.bp,.bs{padding:6px 16px;border-radius:var(--r);font-size:.8rem;font-family:var(--fd);letter-spacing:.06em;text-transform:uppercase;cursor:pointer;border:1px solid;transition:all var(--tr)}
.bp{background:var(--gold);border-color:var(--gold);color:#0a0c0e;font-weight:700}
.bp:hover{background:#dbb855}
.bs{background:transparent;border-color:var(--border);color:var(--t2)}
.bs:hover{border-color:var(--border-b);color:var(--t1)}

/* TOAST */
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--elevated);border:1px solid var(--border-b);border-radius:18px;padding:7px 18px;font-size:.8rem;color:var(--t1);z-index:999;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* BTNS */
.btn{display:inline-flex;align-items:center;gap:5px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:6px 13px;color:var(--t2);font-size:.78rem;font-family:var(--fd);letter-spacing:.06em;text-transform:uppercase;cursor:pointer;text-decoration:none;transition:all var(--tr);white-space:nowrap}
.btn:hover{border-color:var(--gold-dim);color:var(--t1)}
.btn-g{border-color:var(--gold);color:var(--gold)}
.btn-g:hover{background:var(--gold-glow)}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border-b);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--gold-dim)}

/* RESPONSIVE */
@media(max-width:640px){
  .grid{grid-template-columns:1fr}
  .hdr{flex-direction:column;align-items:flex-start}
  .hdr-r{width:100%;justify-content:flex-start}
  .sw{max-width:100%}
  #rcount{margin-left:0}
  .logo h1{font-size:1.15rem}
}
@media(min-width:641px) and (max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<div id="ldr"><div class="linner"><div class="llogo"></div><div class="ltxt">Loading Arsenal…</div></div></div>

<div id="umodal" class="mo">
  <div class="md">
    <h2>Set Your Profile</h2>
    <p>Choose a name to save your mastery and ownership data locally on this device/browser.</p>
    <input type="text" id="uinput" placeholder="e.g. Tenno_Prime" maxlength="40" autocomplete="off"/>
    <div class="mbtns">
      <button id="ucancl" class="bs">Cancel</button>
      <button id="usave" class="bp">Save</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<div class="wrap">
  <header class="hdr">
    <div class="hdr-l">
      <div class="logo">
        <div class="logo-ico">⚔</div>
        <h1>Arsenal <span>Tracker</span></h1>
      </div>
    </div>
    <div class="hdr-r">
      <div class="user-pill"><span class="ui">◈</span><span id="uname">Guest</span></div>
      <button id="setuser" class="btn btn-g">Set Profile</button>
      <a href="https://wiki.warframe.com/w/Weapons" target="_blank" rel="noopener" class="btn">Wiki ↗</a>
    </div>
  </header>

  <div class="fs"><div class="fs-lbl">Weapon Type</div><div id="ftype" class="fg"></div></div>
  <div class="fs"><div class="fs-lbl">Subtype</div><div id="fsub" class="fg"></div></div>
  <div class="fs"><div class="fs-lbl">Community Tier</div><div id="ftier" class="fg"></div></div>

  <div class="ctrl">
    <div class="sw"><span class="si">⌕</span><input type="text" id="srch" placeholder="Search weapons…" autocomplete="off"/></div>
    <button id="qowned" class="qb">◈ Show Owned Only</button>
    <button id="qunmast" class="qb">☆ Hide Mastered</button>
    <span id="rcount" class="rcount">— weapons</span>
  </div>

  <div id="grid" class="grid"></div>
</div>

// ── STATE ──────────────────────────────────────────────────
const CDN = 'https://cdn.warframestat.us/img/';
let userState = {};
let currentUser = 'guest';
let activeFilters = { type:'all', subtype:'all', tier:'all', search:'', showOwned:false, showUnmastered:false };

// ── STORAGE ────────────────────────────────────────────────
function lsGet(k){ try{ const r=localStorage.getItem(k); return r?JSON.parse(r):null; }catch{return null;} }
function lsSet(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }
function saveState(){ lsSet('wf_state_'+currentUser, userState); }

// ── INIT ───────────────────────────────────────────────────
function init(){
  const saved = lsGet('wf_username');
  if(saved){ currentUser=saved; document.getElementById('uname').textContent=saved; }
  userState = lsGet('wf_state_'+currentUser) || {};
  renderFilters();
  renderGrid();
  bindEvents();
  document.getElementById('ldr').style.display='none';
}

// ── FILTERS ────────────────────────────────────────────────
function renderFilters(){
  const types = ['all','Primary','Secondary','Melee'];
  const tiers = ['all','fodder','good','endgame'];
  const subtypes = getSubtypes();

  document.getElementById('ftype').innerHTML = types.map(t=>
    `<button class="fb ${activeFilters.type===t?'on':''}" data-f="type" data-v="${t}">${t==='all'?'All Types':t}</button>`
  ).join('');

  document.getElementById('fsub').innerHTML = ['all',...subtypes].map(s=>
    `<button class="fb ${activeFilters.subtype===s?'on':''}" data-f="sub" data-v="${s}">${s==='all'?'All Subtypes':s}</button>`
  ).join('');

  document.getElementById('ftier').innerHTML = tiers.map(t=>
    `<button class="fb tb ${tc(t)} ${activeFilters.tier===t?'on':''}" data-f="tier" data-v="${t}">${tierLabel(t)}</button>`
  ).join('');
}

function getSubtypes(){
  const pool = activeFilters.type==='all' ? WEAPONS : WEAPONS.filter(w=>w.type===activeFilters.type);
  return [...new Set(pool.map(w=>w.subtype))].sort();
}

// ── GRID ───────────────────────────────────────────────────
function renderGrid(){
  const ws = filtered();
  const mc = ws.filter(w=>userState[w.id]?.mastery).length;
  document.getElementById('rcount').textContent = `${ws.length} weapons · ${mc} mastered`;

  if(!ws.length){
    document.getElementById('grid').innerHTML=`<div class="empty"><div class="empty-ico">⚔</div><p>No weapons match your filters.</p><button onclick="clearFilters()">Clear Filters</button></div>`;
    return;
  }
  document.getElementById('grid').innerHTML = ws.map(card).join('');
}

function card(w){
  const s = userState[w.id]||{};
  const tclass = tc(w.tier);
  const dots = Array.from({length:5},(_,i)=>`<span class="dot ${i<w.acquisitionDifficulty?'f':''}"></span>`).join('');
  const qb = w.questReward ? `<div class="badge bq">📜 ${w.questReward}</div>` : '';
  const ab = `<div class="badge ba">${acqLabel(w.acquisition)}</div>`;
  const comps = w.components.length ? `
    <div class="cs">
      <div class="ct" onclick="togComp(this)">▶ Components (${w.components.length})</div>
      <div class="cl" style="display:none">
        ${w.components.map(c=>`<div class="cr"><span class="cn">${c.name}</span>${c.qty?`<span class="cq">×${c.qty.toLocaleString()}</span>`:''}<span class="csrc">${c.source||''}</span></div>`).join('')}
      </div>
    </div>` : '';

  return `<div class="card ${s.mastery?'mastered':''} ${s.owned&&!s.mastery?'owned':''}" data-id="${w.id}">
  <div class="stripe ${tclass}"></div>
  <div class="ch">
    <div class="img-w">
      <img class="wimg" src="${CDN}${w.imageName}" alt="${w.name}" loading="lazy"
        onerror="this.onerror=null;this.src='https://wiki.warframe.com/images/${encodeURIComponent(w.name.replace(/ /g,''))}.png?format=original';this.onerror=function(){this.style.display='none';this.parentElement.innerHTML='<span style=\\'font-size:1.6rem;opacity:.4\\'>⚔</span>'}">
    </div>
    <div class="ctb">
      <div class="wname">${w.name}</div>
      <div class="wmeta">
        <span class="tt">${w.type}</span>
        <span class="st">${w.subtype}</span>
        ${w.masteryReq>0?`<span class="mr">MR${w.masteryReq}</span>`:''}
      </div>
      <div class="tlbl ${tclass}">${tierLabel(w.tier)}</div>
    </div>
  </div>
  <div class="cb">
    ${qb}${ab}
    <div class="dr"><span class="dl">Obtain</span><div class="dots">${dots}</div></div>
    <p class="ad">${w.acquisitionDetail}</p>
    <p class="tn">${w.tierNote}</p>
    ${comps}
  </div>
  <div class="cf">
    <div class="tr-row">
      <button class="tbtn ${s.owned?'on':''}" onclick="togOwned('${w.id}')">
        <span>${s.owned?'✓':'+'}</span> ${s.owned?'Owned':'Not Owned'}
      </button>
      <button class="tbtn mb ${s.mastery?'on':''}" onclick="togMastery('${w.id}')">
        <span>${s.mastery?'★':'☆'}</span> ${s.mastery?'Mastered':'Mastery'}
      </button>
    </div>
    <a href="${w.wikiUrl}" target="_blank" rel="noopener" class="wl">Wiki ↗</a>
  </div>
</div>`;
}

// ── TOGGLES ────────────────────────────────────────────────
function togOwned(id){
  if(!userState[id]) userState[id]={};
  userState[id].owned = !userState[id].owned;
  saveState(); refreshCard(id);
}
function togMastery(id){
  if(!userState[id]) userState[id]={};
  userState[id].mastery = !userState[id].mastery;
  if(userState[id].mastery) userState[id].owned=true;
  saveState(); refreshCard(id);
  const mc = filtered().filter(w=>userState[w.id]?.mastery).length;
  document.getElementById('rcount').textContent = `${filtered().length} weapons · ${mc} mastered`;
}
function refreshCard(id){
  const w = WEAPONS.find(x=>x.id===id);
  if(!w) return;
  const el = document.querySelector(`.card[data-id="${id}"]`);
  if(!el) return;
  const tmp = document.createElement('div');
  tmp.innerHTML = card(w);
  el.replaceWith(tmp.firstElementChild);
}
function togComp(btn){
  const list = btn.nextElementSibling;
  const open = list.style.display!=='none';
  list.style.display = open?'none':'block';
  btn.textContent = btn.textContent.replace(open?'▼':'▶', open?'▶':'▼');
}

// ── FILTERING ──────────────────────────────────────────────
function filtered(){
  return WEAPONS.filter(w=>{
    if(activeFilters.type!=='all' && w.type!==activeFilters.type) return false;
    if(activeFilters.subtype!=='all' && w.subtype!==activeFilters.subtype) return false;
    if(activeFilters.tier!=='all' && w.tier!==activeFilters.tier) return false;
    if(activeFilters.search){
      const q=activeFilters.search.toLowerCase();
      if(!w.name.toLowerCase().includes(q)&&!w.subtype.toLowerCase().includes(q)&&!(w.questReward||'').toLowerCase().includes(q)) return false;
    }
    if(activeFilters.showOwned && !userState[w.id]?.owned) return false;
    if(activeFilters.showUnmastered && userState[w.id]?.mastery) return false;
    return true;
  });
}
function clearFilters(){
  activeFilters={type:'all',subtype:'all',tier:'all',search:'',showOwned:false,showUnmastered:false};
  document.getElementById('srch').value='';
  document.getElementById('qowned').classList.remove('on');
  document.getElementById('qunmast').classList.remove('on');
  renderFilters(); renderGrid();
}

// ── EVENTS ─────────────────────────────────────────────────
function bindEvents(){
  document.getElementById('ftype').addEventListener('click',e=>{
    const b=e.target.closest('.fb'); if(!b) return;
    activeFilters.type=b.dataset.v; activeFilters.subtype='all';
    renderFilters(); renderGrid();
  });
  document.getElementById('fsub').addEventListener('click',e=>{
    const b=e.target.closest('.fb'); if(!b) return;
    activeFilters.subtype=b.dataset.v; renderFilters(); renderGrid();
  });
  document.getElementById('ftier').addEventListener('click',e=>{
    const b=e.target.closest('.fb'); if(!b) return;
    activeFilters.tier=b.dataset.v; renderFilters(); renderGrid();
  });
  let sd;
  document.getElementById('srch').addEventListener('input',e=>{
    clearTimeout(sd); sd=setTimeout(()=>{ activeFilters.search=e.target.value.trim(); renderGrid(); },200);
  });
  document.getElementById('qowned').addEventListener('click',e=>{
    activeFilters.showOwned=!activeFilters.showOwned;
    e.currentTarget.classList.toggle('on',activeFilters.showOwned); renderGrid();
  });
  document.getElementById('qunmast').addEventListener('click',e=>{
    activeFilters.showUnmastered=!activeFilters.showUnmastered;
    e.currentTarget.classList.toggle('on',activeFilters.showUnmastered); renderGrid();
  });
  document.getElementById('setuser').addEventListener('click',()=>{
    document.getElementById('umodal').style.display='flex';
    document.getElementById('uinput').focus();
  });
  document.getElementById('usave').addEventListener('click',()=>{
    const v=document.getElementById('uinput').value.trim(); if(!v) return;
    currentUser=v; lsSet('wf_username',v); saveState();
    document.getElementById('uname').textContent=v;
    document.getElementById('umodal').style.display='none';
    toast(`Profile saved as "${v}"`);
  });
  document.getElementById('ucancl').addEventListener('click',()=>{ document.getElementById('umodal').style.display='none'; });
  document.getElementById('umodal').addEventListener('click',e=>{ if(e.target===document.getElementById('umodal')) document.getElementById('umodal').style.display='none'; });
  document.getElementById('uinput').addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('usave').click(); });
}

// ── HELPERS ────────────────────────────────────────────────
function tierLabel(t){ return {fodder:'🗑 Mastery Fodder',good:'👍 Good',endgame:'🔥 Endgame',all:'All Tiers'}[t]||t; }
function tc(t){ return {endgame:'te',good:'tg',fodder:'tf',all:''}[t]||''; }
function acqLabel(a){
  return {market_credits:'🛒 Market (Credits)',blueprint:'📋 Blueprint',blueprint_farm:'⚒ Blueprint + Farm',quest:'📜 Quest Reward',boss_farm:'💀 Boss Farm',lich:'👁 Kuva Lich',sister:'👁 Sister of Parvos',syndicate:'🔮 Syndicate',dojo:'🏯 Clan Dojo',railjack:'🚀 Railjack',clan_trade:'🤝 Clan / Trade',crafted:'🔧 Kitgun / Zaw',warframe_unlock:'🦾 Warframe Unlock'}[a]||a;
}
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
