<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Warframe Arsenal Tracker — track mastery, ownership, acquisition difficulty, and community tier ratings for all weapons." />
  <title>Warframe Arsenal Tracker</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><polygon points='50,5 95,38 82,95 18,95 5,38' fill='%23c8a84b'/></svg>" />
</head>
<body>

<!-- Loader -->
<div id="loader">
  <div class="loader-inner">
    <div class="loader-logo"></div>
    <div class="loader-text">Loading Arsenal…</div>
  </div>
</div>

<!-- Username Modal -->
<div id="username-modal" class="modal-overlay">
  <div class="modal">
    <h2>Set Your Profile</h2>
    <p>Choose a name to save your mastery and ownership data locally. Use the same name on any device to keep things consistent.</p>
    <input type="text" id="username-input" placeholder="e.g. Tenno_Prime" maxlength="40" autocomplete="off" />
    <div class="modal-btns">
      <button id="cancel-username" class="btn-secondary">Cancel</button>
      <button id="save-username" class="btn-primary">Save</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- App -->
<div class="app-wrap">

  <!-- Header -->
  <header class="app-header">
    <div class="header-left">
      <div class="logo">
        <div class="logo-icon">⚔</div>
        <h1>Arsenal <span>Tracker</span></h1>
      </div>
    </div>
    <div class="header-right">
      <div class="user-pill">
        <span class="user-icon">◈</span>
        <span id="username-display">Guest</span>
      </div>
      <button id="set-username" class="btn btn-gold">Set Profile</button>
      <a href="https://wiki.warframe.com/w/Weapons" target="_blank" rel="noopener" class="btn">Wiki ↗</a>
    </div>
  </header>

  <!-- Filters -->
  <div class="filter-section">
    <div class="filter-section-label">Weapon Type</div>
    <div id="filter-type" class="filter-group"></div>
  </div>

  <div class="filter-section">
    <div class="filter-section-label">Subtype</div>
    <div id="filter-subtype" class="filter-group"></div>
  </div>

  <div class="filter-section">
    <div class="filter-section-label">Community Tier</div>
    <div id="filter-tier" class="filter-group"></div>
  </div>

  <!-- Controls Bar -->
  <div class="controls-bar">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="search-input" placeholder="Search weapons…" autocomplete="off" />
    </div>
    <button id="toggle-owned" class="quick-filter-btn">◈ Show Owned Only</button>
    <button id="toggle-unmastered" class="quick-filter-btn">☆ Hide Mastered</button>
    <span id="result-count" class="result-count">— weapons</span>
  </div>

  <!-- Weapon Grid -->
  <div id="weapon-grid" class="weapon-grid"></div>

</div><!-- /app-wrap -->

<script src="js/app.js"></script>
</body>
</html>
